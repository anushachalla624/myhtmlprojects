    <title>mybankappv1</title>
</head>

<body>
    <header>
        <h1>
            <center>
                <font color="orange">Anusha</font>
                <font color="blue"> Bank</font>
            </center>
        </h1>
        <nav>
            <a href="index.html">About Bank</a> &nbsp
            <a href="Loans.html">Loans</a> &nbsp
            <a href="Branches.html">Branches</a> &nbsp
            <a href="Customer_Registration_Form.html">Customer Registration</a> &nbsp

            <a href="#">Branch Feedback</a> &nbsp
        </nav>
    </header>
    <hr>
    <main>
        <section>
            <form>
                <caption>
                    <center>
                        <H1>Branch FeedBack</H1>
                    </center>
                </caption>
                <table border="2px" align="center" cellpadding="10px" cellspacing="10px">
                    <tr>
                        <td><label>Name</label></td>
                        <td><input type="text" id="name" name="name"></td>
                    </tr>
                    <tr>
                        <td><label>Email</label></td>
                        <td><input type="email" id="email" name="email"></td>
                    </tr>
                    <tr>
                        <td><label>Branch</label></td>
                        <td><select name="Branch">
                                <option value="Hyderabad">Hyderabad</option>
                                <option value="Banglore">Banglore</option>
                                <option value="Pune">Pune</option>
                                <option value="Chennai">Chennai</option>
                            </select></td>
                    </tr>
                    <tr>
                        <td><label>Visit Date</label></td>
                        <td><input type="date"></td>
                    </tr>
                    <tr>
                        <td><label>Rating</label></td>
                        <td><input type="radio" value="Excellent" id="Excellent" name="Rating">Excellent
                            <input type="radio" value="Good" id="Good" name="Rating">Good
                            <input type="radio" value="Average" id="Average" name="Rating">Average
                        </td>

                    </tr>
                    <tr>
                        <td><label>Services Used</label></td>
                        <td><input type="checkbox" value="ATM" id="ATM" name="Services used">ATM
                            <input type="checkbox" value="Loan" id="Loan" name="Services used">Loan
                            <input type="checkbox" value="Account" id="Account" name="Services used">Account
                        </td>
                    </tr>
                    <tr>
                        <td><label>Suggestions</label></td>
                        <td><input type="text"></td>
                    </tr>
                    <tr>
                        <td colspan="2" align="center"><input type="submit" ,value="submit">
                            <input type="Reset" ,value="reset">
                        </td>
                    </tr>
                </table>
            </form>


        </section>
    </main>
    <hr>
    <footer>
        <h3>
            <center>
                <font color="green">copy@Anusha</font>"
            </center>
        </h3>
    </footer>
    <hr>
