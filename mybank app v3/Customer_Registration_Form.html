    <main>
        <section>
            <Caption>
                <Center>
                    <h1>Customer Registration Form</h1>
                </Center>
            </Caption>
            <form>
                <table border="2" align="center">
                    <tr>
                        <td><label>Customer Name</label></td>
                        <td><input type="text" name="customerName"></td>
                    </tr>
                    <tr>
                        <td><label>Password</label></td>
                        <td><input type="password" name="password"></td>
                    </tr>
                    <tr>
                        <td><label>Confirm Password</label></td>
                        <td><input type="password" name="confirmPassword"></td>
                    </tr>
                    <tr>
                        <td><label>Email</label></td>
                        <td><input type="email" name="email"></td>
                    </tr>
                    <tr>
                        <td><label>Mobile</label></td>
                        <td><input type="tel" name="mobile"></td>
                    </tr>
                    <tr>
                        <td><label>Date of Birth</label></td>
                        <td><input type="date" name="dob"></td>
                    </tr>
                    <tr>
                        <td><label>Gender</label></td>
                        <td><input type="radio" value="Male" name="gender"> Male
                            <input type="radio" value="Female" name="gender"> Female
                            <input type="radio" value="Other" name="gender"> Other
                        </td>
                    </tr>
                    <tr>
                        <td><label>Account Type</label></td>
                        <td><select name="accountType">
                                <option value="Savings">Savings</option>
                                <option value="Current">Current</option>
                            </select></td>
                    </tr>
                    <tr>
                        <td><label>Aadhar Number</label></td>
                        <td><input type="text" name="aadharNumber"></td>
                    </tr>
                    <tr>
                        <td><label>PAN Upload</label></td>
                        <td><input type="file" name="panUpload"></td>
                    </tr>
                    <tr>
                        <td><label>Address</label></td>
                        <td><textarea name="address"></textarea></td>
                    </tr>
                    <tr>
                        <td><label>Terms</label></td>
                        <td><input type="checkbox" name="Agreed terms">I Agree</td>
                    </tr>

                    <tr>
                        <td colspan="2" align="center"><input type="Submit" value="Submit">
                            <input type="Reset" value="Reset">
                        </td>
                    </tr>


                </table>
            </form>


        </section>
