    <main>
        <section>
            <form>
                <caption>
                    <center>
                        <h1>EMI Calculator</h1>
                    </center>
                </caption>
                <table border="2" align="center">
                    <tr>
                        <td><label>Loan Amount</label></td>
                        <td><input type="number" id="loanAmount" name="loanAmount"></td>
                    </tr>
                    <tr>
                        <td><label>Interest Rate(%)</label></td>
                        <td><input type="number" id="interestRate" name="interestRate" step="0.01"></td>
                    </tr>
                    <tr>
                        <td><label>Loan Tenure </label></td>
                        <td><input type="number" id="loanTenure" name="loanTenure"></td>
                    </tr>
                    <tr>
                        <td><label>Tenure Type</label></td>
                        <td><select id="tenureType" name="tenureType">
                                <option value="months">Months</option>
                                <option value="years">Years</option>
                            </select></td>
                    </tr>
                    <tr>
                        <td><label>EMI Start Date</label></td>
                        <td><input type="date" id="emiStartDate" name="emiStartDate"></td>
                    </tr>
                    <tr>
                        <td colspan="2" align="center"><input type="submit" value="Calculate EMI">
                            <input type="reset" value="Reset">
                        </td>
                    </tr>
                </table>
            </form>
        </section>
    </main>
